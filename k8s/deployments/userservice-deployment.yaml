apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  namespace: enterprise-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      serviceAccountName: auth-sa
      containers:
      - name: userservice
        image: 485185308834.dkr.ecr.us-east-1.amazonaws.com/microservice-userservice:latest
        ports:
        - containerPort: 50052

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

        env:
        - name: AWS_REGION
          value: us-east-1

        - name: AWS_SECRET_NAME
          value: microservice-prod-db-secret